name: Run AWS Script

on:
  # Trigger manually via GitHub UI
  workflow_dispatch:
    inputs:
      region:
        description: 'AWS Region'
        required: false
        default: 'ap-south-1'
        type: string
      team:
        description: 'Team tag value'
        required: false
        default: 'Team1'
        type: string
      project:
        description: 'Project tag value'
        required: false
        default: 'Project1'
        type: string
      feature:
        description: 'Feature tag value'
        required: false
        default: 'Feature1'
        type: string
      environment:
        description: 'Environment tag value'
        required: false
        default: 'Lab'
        type: string
      sleep_seconds:
        description: 'Sleep duration in seconds'
        required: false
        default: '90'
        type: string
      lambda_memory:
        description: 'Lambda memory in MB'
        required: false
        default: '128'
        type: string
      invocation_count:
        description: 'Number of Lambda invocations'
        required: false
        default: '60'
        type: string
      keep_resources:
        description: 'Keep resources after execution (true/false)'
        required: false
        default: 'false'
        type: string


  # Trigger on push to main branch (optional)
  push:
    branches:
      - main

jobs:
  run-aws-script:
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
        #   role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        #   aws-region: ${{ inputs.region || 'ap-south-1' }}
        #   Alternatively, if using static credentials:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.region || 'ap-south-1' }}

      - name: Verify AWS CLI
        run: aws --version

      - name: Make script executable
        run: chmod +x aws-script.sh

      - name: Run AWS script
        run: ./aws-script.sh
        env:
          REGION: ${{ inputs.region || 'ap-south-1' }}
          TEAM: ${{ inputs.team || 'Team1' }}
          PROJECT: ${{ inputs.project || 'Project1' }}
          FEATURE: ${{ inputs.feature || 'Feature1' }}
          ENVIRONMENT_TAG: ${{ inputs.environment || 'Lab' }}
          SLEEP_SECONDS: ${{ inputs.sleep_seconds || '90' }}
          LAMBDA_MEMORY_MB: ${{ inputs.lambda_memory || '128' }}
          INVOCATION_COUNT: ${{ inputs.invocation_count || '60' }}
          KEEP_RESOURCES: ${{ inputs.keep_resources || 'false' }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: aws-script-logs
          path: |
            *.json
            *.log
